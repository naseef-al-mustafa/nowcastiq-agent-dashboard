<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NowcastIQ — Dashboard & Agent</title>
<style>
  body {
    font-family: sans-serif;
    background-color: #0f1117;
    color: #e4e7ef;
    margin: 0;
    padding: 0;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #1a1d27;
    padding: 10px 20px;
  }
  nav button {
    margin-right: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    background-color: #242836;
    color: #e4e7ef;
    cursor: pointer;
  }
  section {
    padding: 20px;
  }
  .hidden {
    display: none;
  }
  #chat-container {
    background-color: #1a1d27;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    border: 1px solid #2e3345;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  #chat-container div {
    margin-bottom: 4px;
  }
  input[type="text"] {
    width: 80%;
    padding: 8px;
    background-color: #242836;
    color: #e4e7ef;
    border: 1px solid #2e3345;
    border-radius: 4px;
  }
  button.primary {
    background-color: #3e64ff;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>
<header>
  <h1>NowcastIQ</h1>
  <nav>
    <button id="nav-dashboard">Dashboard</button>
    <button id="nav-agent">Agent Ops</button>
  </nav>
</header>

<section id="dashboard">
  <h2>Dashboard</h2>
  <p>Welcome to the GTM Dashboard. This area can host your existing sales or marketing dashboards.</p>
</section>

<section id="agent" class="hidden">
  <h2>Agent Control Center</h2>
  <div id="status">
    <p><strong>Health:</strong> <span id="agent-health">–</span></p>
    <p><strong>Last run:</strong> <span id="agent-last-run">–</span></p>
    <p><strong>Tasks created:</strong> <span id="agent-tasks">–</span></p>
    <p><strong>Flags raised:</strong> <span id="agent-flags">–</span></p>
  </div>
  <div id="controls">
    <button id="btn-health" class="primary">Health Check</button>
    <button id="btn-run-dry" class="primary">Run Dry Run</button>
    <button id="btn-refresh" class="primary">Refresh Status</button>
  </div>
  <h3>Agent Chat</h3>
  <div id="chat-container"></div>
  <input id="chat-input" type="text" placeholder="Type a message...">
  <button id="chat-send" class="primary">Send</button>
</section>

<script>
// Toggle between dashboard and agent sections
const dashboardSection = document.getElementById('dashboard');
const agentSection = document.getElementById('agent');
document.getElementById('nav-dashboard').onclick = () => {
  dashboardSection.classList.remove('hidden');
  agentSection.classList.add('hidden');
};
document.getElementById('nav-agent').onclick = () => {
  agentSection.classList.remove('hidden');
  dashboardSection.classList.add('hidden');
};

// Chat history stored in localStorage
const chatContainer = document.getElementById('chat-container');
let chatHistory = [];
try {
  chatHistory = JSON.parse(localStorage.getItem('agentChat') || '[]');
} catch (e) {
  chatHistory = [];
}
function renderChat() {
  chatContainer.innerHTML = '';
  chatHistory.forEach(msg => {
    const div = document.createElement('div');
    div.textContent = `${msg.role}: ${msg.content}`;
    chatContainer.appendChild(div);
  });
  chatContainer.scrollTop = chatContainer.scrollHeight;
}
renderChat();

async function sendChat() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  chatHistory.push({ role: 'User', content: message });
  renderChat();
  input.value = '';
  localStorage.setItem('agentChat', JSON.stringify(chatHistory));
  try {
    const res = await fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    chatHistory.push({ role: 'Agent', content: data.reply || data.error || '' });
    localStorage.setItem('agentChat', JSON.stringify(chatHistory));
    renderChat();
  } catch (err) {
    chatHistory.push({ role: 'Agent', content: 'Error: ' + err.message });
    localStorage.setItem('agentChat', JSON.stringify(chatHistory));
    renderChat();
  }
}
document.getElementById('chat-send').onclick = sendChat;
document.getElementById('chat-input').addEventListener('keyup', (e) => {
  if (e.key === 'Enter') sendChat();
});

// API calls
async function healthCheck() {
  try {
    const res = await fetch('/api/agent/status');
    const data = await res.json();
    document.getElementById('agent-health').textContent = data.status || JSON.stringify(data);
  } catch (err) {
    document.getElementById('agent-health').textContent = 'Error';
  }
}
async function runDry() {
  try {
    const res = await fetch('/api/agent/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dryRun: true })
    });
    const data = await res.json();
    alert(data.result || data.error || 'Done');
  } catch (err) {
    alert('Error: ' + err.message);
  }
}
async function refreshStatus() {
  // In a more advanced implementation this could fetch and update multiple metrics
  await healthCheck();
}
document.getElementById('btn-health').onclick = healthCheck;
document.getElementById('btn-run-dry').onclick = runDry;
document.getElementById('btn-refresh').onclick = refreshStatus;

// Initial status on page load
healthCheck();
</script>
</body>
</html>
